<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STP-13026</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__overlay container"></div>
      <div class="container site-header__inner">
        <a class="site-header__home" href="#home">Home</a>

        <nav class="site-header__nav" aria-label="Main navigation">
          <a href="#home">Home</a>
          <a href="#about">About the Game</a>
          <a href="#how-to-play">How to Play</a>
          <a href="#gallery">Gallery</a>
          <a href="#why-play">Why Play</a>
          <a href="#contact">Contact</a>
        </nav>

        <button
          class="site-header__burger"
          type="button"
          aria-label="Open menu"
          data-action="open"
          data-expanded="false"
        >
          <svg
            class="site-header__burger-icon"
            width="24"
            height="18"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <use href="./assets/img/svg/sprite.svg#icon-burger3"></use>
          </svg>
          <svg
            class="site-header__burger-icon site-header__burger-icon--close"
            width="18"
            height="18"
            viewBox="0 0 18 18"
            aria-hidden="true"
          >
            <use href="./assets/img/svg/sprite.svg#icon-close"></use>
          </svg>
        </button>

        <div class="mobile-menu" data-visible="close">
          <div class="mobile-menu__panel">
            <div class="mobile-menu__top"></div>

            <nav class="mobile-menu__nav" aria-label="Mobile navigation">
              <a data-nav-active href="#home" data-menu-link>Home</a>
              <a href="#about" data-menu-link>About the Game</a>
              <a href="#how-to-play" data-menu-link>How to Play</a>
              <a href="#gallery" data-menu-link>Gallery</a>
              <a href="#why-play" data-menu-link>Why Play</a>
              <a href="#contact" data-menu-link>Contact</a>
            </nav>

            <div class="mobile-menu__characters" aria-hidden="true">
              <img
                class="mobile-menu__shadow mobile-menu__shadow--small"
                src="./assets/img/advantages/character-small.webp (1).png"
                alt=""
              />
              <img
                class="mobile-menu__shadow mobile-menu__shadow--big"
                src="./assets/img/advantages/character-big.webp (1).png"
                alt=""
              />
              <img
                class="mobile-menu__character mobile-menu__character--small"
                src="./assets/img//heroes/hero-desctop-2x_5.webp"
                alt=""
              />
              <img
                class="mobile-menu__character mobile-menu__character--big"
                src="./assets/img/heroes/hero-desctop-1x_7.webp"
                alt=""
              />
            </div>

            <button
              type="button"
              class="mobile-menu__close"
              data-action="close"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
